{% extends 'legacy/base.html' %}

{% block title %}Вход{% endblock %}

{% block content %}
  <h1>Вход</h1>

  <div style="margin: 10px 0 16px;">
    <a class="btn" href="{% url 'legacy_register_start' %}?next={{ next|urlencode }}">Регистрация</a>
  </div>

  {% if error %}
    <p class="red-text">{{ error }}</p>
  {% endif %}

  <div class="card">
    <div class="card-content">
      <p style="margin-top:0; font-weight:600;">Войти через соцсеть:</p>
      <div style="display:flex; flex-wrap:wrap; gap:10px;">
        <a href="{% url 'oauth_vk_start' %}?provider=vk&next={{ next|urlencode }}"
           style="display:inline-flex;align-items:center;gap:8px;padding:10px 20px;background:#0077FF;color:#fff;border-radius:4px;text-decoration:none;font-weight:600;font-size:14px;">
          <svg viewBox="0 0 24 24" style="width:20px;height:20px;fill:#fff;"><path d="M21.54 7.2c.15-.5 0-.87-.72-.87h-2.37c-.6 0-.88.32-1.03.67 0 0-1.2 2.93-2.91 4.84-.55.55-.8.73-1.1.73-.15 0-.38-.18-.38-.68V7.2c0-.6-.17-.87-.67-.87H9.14c-.38 0-.6.28-.6.54 0 .57.85.7.94 2.3v3.48c0 .76-.14.9-.44.9-.8 0-2.76-2.96-3.92-6.35C4.9 6.6 4.67 6.33 4.06 6.33H1.7c-.68 0-.82.32-.82.67 0 .63.8 3.75 3.73 7.87C6.56 17.87 9.14 19 11.47 19c1.4 0 1.57-.32 1.57-.86v-2.13c0-.68.14-.82.62-.82.35 0 .95.18 2.35 1.53 1.6 1.6 1.87 2.32 2.77 2.32h2.37c.68 0 1.02-.34.82-.99-.21-.66-.98-1.61-2-2.74-.55-.65-1.38-1.36-1.63-1.71-.35-.45-.25-.65 0-1.05 0 0 2.87-4.05 3.17-5.42z"/></svg>
          ВКонтакте
        </a>
        <a href="{% url 'oauth_vk_start' %}?provider=ok_ru&next={{ next|urlencode }}"
           style="display:inline-flex;align-items:center;gap:8px;padding:10px 20px;background:#EE8208;color:#fff;border-radius:4px;text-decoration:none;font-weight:600;font-size:14px;">
          <svg viewBox="0 0 24 24" style="width:20px;height:20px;fill:#fff;"><path d="M12 2a4.5 4.5 0 1 1 0 9 4.5 4.5 0 0 1 0-9zm0 2.5a2 2 0 1 0 0 4 2 2 0 0 0 0-4zm4.44 8.52a7.2 7.2 0 0 1-4.44 1.48 7.2 7.2 0 0 1-4.44-1.48 1.25 1.25 0 0 0-1.56 1.96A9.7 9.7 0 0 0 10.75 17l-3.47 3.47a1.25 1.25 0 0 0 1.77 1.77L12 19.27l2.95 2.97a1.25 1.25 0 0 0 1.77-1.77L13.25 17a9.7 9.7 0 0 0 4.75-2.02 1.25 1.25 0 0 0-1.56-1.96z"/></svg>
          Одноклассники
        </a>
        <a href="{% url 'oauth_vk_start' %}?provider=mail_ru&next={{ next|urlencode }}"
           style="display:inline-flex;align-items:center;gap:8px;padding:10px 20px;background:#005FF9;color:#fff;border-radius:4px;text-decoration:none;font-weight:600;font-size:14px;">
          <svg viewBox="0 0 24 24" style="width:20px;height:20px;fill:#fff;"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm5.46 12.46c-.48.86-1.4 1.38-2.39 1.38-.53 0-1.04-.15-1.49-.44-.6-.39-.96-1.02-.96-1.71V10.5c0-.28-.22-.5-.5-.5h-.24c-1.66 0-3.01 1.57-3.01 3.5s1.35 3.5 3.01 3.5c.64 0 1.24-.22 1.74-.64.16-.13.39-.11.52.05.13.16.11.39-.05.52-.63.52-1.39.81-2.21.81-2.04 0-3.71-1.84-3.71-4.24S9.84 9.26 11.88 9.26h.24c.66 0 1.2.54 1.2 1.2v3.2c0 .4.21.76.56.97.31.19.67.28 1.04.28.68 0 1.31-.36 1.64-.95.38-.67.58-1.45.58-2.26 0-3.17-2.36-5.64-5.38-5.64-3.04 0-5.52 2.68-5.52 5.94s2.47 5.94 5.52 5.94c1.08 0 2.13-.33 3.03-.96.17-.12.4-.08.52.09.12.17.08.4-.09.52-1.03.72-2.23 1.1-3.46 1.1-3.42 0-6.22-2.93-6.22-6.69S8.34 5.01 11.76 5.01c3.4 0 6.08 2.73 6.08 6.39 0 .94-.23 1.85-.68 2.66z"/></svg>
          Mail.ru
        </a>
      </div>
    </div>
  </div>

  <div class="card" style="margin-top:16px;">
    <div class="card-content">
      <p style="margin-top:0; font-weight:600;">Или войти по логину:</p>
      <form method="post">
        {% csrf_token %}
        <input type="hidden" name="next" value="{{ next }}" />

        <div class="input-field" style="padding-left:0;">
          <input id="username" name="username" value="{{ username|default:'' }}" />
          <label for="username" style="left:0;">Username</label>
        </div>

        <div class="input-field" style="padding-left:0;">
          <input id="password" name="password" type="password" />
          <label for="password" style="left:0;">Пароль</label>
        </div>

        <button class="btn" type="submit">Войти</button>
      </form>
    </div>
  </div>

  <p><a href="/adverts/">← К объявлениям</a></p>
{% endblock %}
