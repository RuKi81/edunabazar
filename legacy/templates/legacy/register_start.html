{% extends 'legacy/base.html' %}

{% block title %}Регистрация{% endblock %}

{% block content %}
  <h1>Регистрация</h1>

  <div class="card">
    <div class="card-content">
      <p style="margin-top:0;">Выберите удобный способ регистрации:</p>

      <div style="display:flex; flex-wrap:wrap; gap:12px; margin-top: 14px;">
        <a class="btn" href="{% url 'legacy_register_sms' %}?next={{ request.GET.next|default:''|urlencode }}" style="background:#7fb500; box-shadow:none; border-radius:0;">По телефону (СМС)</a>
        <a class="btn" href="{% url 'legacy_register_email' %}?next={{ request.GET.next|default:''|urlencode }}" style="background:#0090b6; box-shadow:none; border-radius:0;">По Email</a>
      </div>
    </div>
  </div>

  <p><a href="{% url 'legacy_login' %}?next={{ request.GET.next|default:''|urlencode }}">← Уже есть аккаунт? Войти</a></p>
{% endblock %}
