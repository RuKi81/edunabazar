version: "3.9"

# VM2: Database server (93.95.98.209)
# Deploy: copy this file + init.sql to the DB server and run:
#   docker compose up -d

services:
  db:
    image: postgis/postgis:16-3.4
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME:-enb_DB}
      POSTGRES_USER: ${DB_USER:-enb_app}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
    ports:
      # Expose to app server only — use firewall to restrict access
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./pg_hba_custom.conf:/etc/postgresql/pg_hba.conf:ro
    command: >
      postgres
        -c listen_addresses='*'
        -c max_connections=100
        -c shared_buffers=256MB
        -c work_mem=8MB
        -c maintenance_work_mem=128MB
        -c log_statement=mod
        -c log_min_duration_statement=500
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-enb_app} -d ${DB_NAME:-enb_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
