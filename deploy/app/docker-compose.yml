version: "3.9"

# VM1: Application server (195.47.196.46)
# Deploy: clone repo to /opt/edunabazar, then:
#   docker compose -f deploy/app/docker-compose.yml up -d

services:
  redis:
    image: redis:7-alpine
    restart: always
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  web:
    build:
      context: ../../
      dockerfile: Dockerfile
    restart: always
    env_file:
      - ../../.env
    environment:
      # DB on VM2
      DB_HOST: ${DB_HOST:-10.0.0.11}
      DB_PORT: ${DB_PORT:-5432}
      DJANGO_DEBUG: "0"
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ../../media:/app/media
      - static_files:/app/staticfiles
    expose:
      - "8000"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz')\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  nginx:
    image: nginx:1.27-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ../certbot/conf:/etc/letsencrypt:ro
      - ../certbot/www:/var/www/certbot:ro
      - static_files:/app/staticfiles:ro
      - ../../media:/app/media:ro
    depends_on:
      - web

  certbot:
    image: certbot/certbot
    volumes:
      - ../certbot/conf:/etc/letsencrypt
      - ../certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

volumes:
  static_files:
  redis_data:
