# MVT tile cache: 200MB, inactive 60min, keys in shared zone
proxy_cache_path /tmp/nginx_tile_cache levels=1:2 keys_zone=tiles:10m max_size=200m inactive=60m;

upstream django {
    server web:8000;
}

# Gzip compression
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_min_length 256;
gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/json
    application/xml
    image/svg+xml
    font/woff2
    font/woff
    font/ttf;

# HTTP — redirect to HTTPS + Let's Encrypt challenge
server {
    listen 80;
    server_name edunabazar.ru www.edunabazar.ru 195.47.196.46;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl http2;
    server_name edunabazar.ru www.edunabazar.ru;

    ssl_certificate /etc/letsencrypt/live/edunabazar.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/edunabazar.ru/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Static files
    location /static/ {
        alias /app/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Media files (uploaded photos etc.)
    location /media/ {
        alias /app/media/;
        expires 7d;
        access_log off;
    }

    # MVT tiles — Nginx proxy cache (fast, avoids hitting Django/PostGIS)
    location /agrocosmos/api/tiles/ {
        proxy_pass http://django;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_redirect off;

        proxy_cache tiles;
        proxy_cache_valid 200 10m;
        proxy_cache_valid 204 1m;
        proxy_cache_use_stale error timeout updating;
        proxy_cache_key "$request_uri";
        add_header X-Cache-Status $upstream_cache_status;
    }

    # Agrocosmos API — other endpoints
    location /agrocosmos/api/ {
        proxy_pass http://django;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_redirect off;

        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_buffering off;
    }

    # Proxy to Django/Gunicorn
    location / {
        proxy_pass http://django;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_redirect off;

        client_max_body_size 20M;
    }
}
