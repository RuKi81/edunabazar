upstream django {
    server web:8000;
}

# Gzip compression
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_min_length 256;
gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/json
    application/xml
    image/svg+xml
    font/woff2
    font/woff
    font/ttf;

# HTTP — Cloudflare connects here (Flexible SSL mode)
server {
    listen 80;
    server_name edunabazar.ru www.edunabazar.ru 195.47.196.46;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Static files
    location /static/ {
        alias /app/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Media files (uploaded photos etc.)
    location /media/ {
        alias /app/media/;
        expires 7d;
        access_log off;
    }

    # Proxy to Django/Gunicorn
    location / {
        proxy_pass http://django;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;

        client_max_body_size 20M;
    }
}

