name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

env:
  PYTHON_VERSION: "3.13"
  DJANGO_SETTINGS_MODULE: enb_django.settings
  DJANGO_DEBUG: "1"
  DJANGO_SECRET_KEY: ci-test-secret-key-not-for-production
  DB_HOST: localhost
  DB_PORT: "5432"
  DB_NAME: test_enb
  DB_USER: postgres
  DB_PASSWORD: postgres

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8

      - name: Flake8 (syntax & import errors)
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Flake8 (warnings)
        run: |
          flake8 . --count --max-complexity=15 --max-line-length=120 --statistics --exit-zero

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_enb
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies (GDAL/GEOS)
        run: |
          sudo apt-get update
          sudo apt-get install -y gdal-bin libgdal-dev libgeos-dev

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run migrations
        run: python manage.py migrate --noinput

      - name: Django system check
        run: python manage.py check --deploy --fail-level WARNING 2>&1 || true

      - name: Run tests
        run: python manage.py test legacy agrocosmos --verbosity=2

  docker-build:
    name: Docker build check
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t enb-django:${{ github.sha }} .

  deploy:
    name: Deploy to app server
    runs-on: ubuntu-latest
    needs: [docker-build]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - name: Deploy via SSH to VM1 (app)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          command_timeout: 20m
          script: |
            cd /opt/edunabazar
            git fetch origin
            git reset --hard origin/main
            docker compose -f docker-compose.prod.yml build web
            docker compose -f docker-compose.prod.yml up -d
            docker compose -f docker-compose.prod.yml exec -T web python manage.py migrate --noinput
            docker compose -f docker-compose.prod.yml exec -T web python manage.py collectstatic --noinput
            # Mark stale running PipelineRuns as failed (e.g. killed by prior worker timeout)
            docker compose -f docker-compose.prod.yml exec -T web python manage.py cleanup_stale_runs --timeout-min 10 || true
            docker image prune -f
            # Setup cron jobs
            ( crontab -l 2>/dev/null | grep -v 'fetch_news' | grep -v 'check_monitoring' | grep -v 'check_raster_monitoring' | grep -v 'cleanup_stale_runs' | grep -v 'CRON_TZ' | grep -v 'PATH=.*local' ; printf 'PATH=/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin\n# Daily news fetch at 07:00 Moscow (04:00 UTC)\n0 4 * * * cd /opt/edunabazar && docker compose -f docker-compose.prod.yml exec -T web python manage.py fetch_news --count 3 >> /var/log/fetch_news.log 2>&1\n# Daily MODIS monitoring check at 09:00 Moscow (06:00 UTC)\n0 6 * * * cd /opt/edunabazar && docker compose -f docker-compose.prod.yml exec -T web python manage.py check_monitoring >> /var/log/check_monitoring.log 2>&1\n# Daily S2+L8 monitoring check at 10:00 Moscow (07:00 UTC)\n0 7 * * * cd /opt/edunabazar && docker compose -f docker-compose.prod.yml exec -T web python manage.py check_raster_monitoring >> /var/log/check_raster_monitoring.log 2>&1\n# Cleanup stale PipelineRuns every 10 min\n*/10 * * * * cd /opt/edunabazar && docker compose -f docker-compose.prod.yml exec -T web python manage.py cleanup_stale_runs --timeout-min 15 >> /var/log/cleanup_stale_runs.log 2>&1\n' ) | crontab -
