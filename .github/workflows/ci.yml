name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

# Cancel older in-flight runs when a new commit lands on the same ref.
# Without this a series of fast pushes leaves multiple ~20 min Test jobs
# competing for runners; only the latest commit's result matters anyway.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.13"
  DJANGO_SETTINGS_MODULE: enb_django.settings
  DJANGO_DEBUG: "1"
  DJANGO_SECRET_KEY: ci-test-secret-key-not-for-production
  DB_HOST: localhost
  DB_PORT: "5432"
  DB_NAME: test_enb
  DB_USER: postgres
  DB_PASSWORD: postgres

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8

      - name: Flake8 (syntax & import errors)
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Flake8 (warnings)
        run: |
          flake8 . --count --max-complexity=15 --max-line-length=120 --statistics --exit-zero

  test:
    name: Test
    runs-on: ubuntu-latest
    # 30 min — accumulated migration weight (47+ migrations, several with
    # heavy PostGIS DDL) regularly puts us over the previous 20-min cap.
    # Track-down work is in docs/TODO_infra.md.
    timeout-minutes: 30

    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_enb
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies (GDAL/GEOS)
        # --no-install-recommends drops ~100 optional packages (cfitsio-doc,
        # libaom-dev, libhdf5-doc, poppler-data, proj-data, python3-numpy…)
        # cutting install from ~475 MB / 9 min down to ~80 MB / <2 min.
        # DEBIAN_FRONTEND=noninteractive avoids interactive tzdata prompts.
        run: |
          sudo DEBIAN_FRONTEND=noninteractive apt-get update -qq
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            gdal-bin libgdal-dev libgeos-dev

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run migrations
        run: python manage.py migrate --noinput

      - name: Django system check
        run: python manage.py check --deploy --fail-level WARNING 2>&1 || true

      - name: Run tests
        run: python manage.py test legacy agrocosmos --verbosity=2

  docker-build:
    name: Docker build check
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t enb-django:${{ github.sha }} .

  deploy:
    name: Deploy to app server
    runs-on: ubuntu-latest
    needs: [docker-build]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - name: Deploy via SSH to VM1 (app)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          command_timeout: 20m
          script: |
            cd /opt/edunabazar
            git fetch origin
            git reset --hard origin/main
            # Build both web and worker — they share the Dockerfile but
            # docker compose maintains them as separate image tags.
            docker compose -f docker-compose.prod.yml build web worker
            docker compose -f docker-compose.prod.yml up -d
            docker compose -f docker-compose.prod.yml exec -T web python manage.py migrate --noinput
            docker compose -f docker-compose.prod.yml exec -T web python manage.py collectstatic --noinput
            # Mark stale running PipelineRuns as failed (e.g. killed by prior worker timeout)
            docker compose -f docker-compose.prod.yml exec -T web python manage.py cleanup_stale_runs --timeout-min 10 || true
            # Make sure every Region has an active MODIS monitoring task for
            # the current year. Idempotent — only creates missing tasks and
            # reactivates paused ones; never overwrites state otherwise.
            docker compose -f docker-compose.prod.yml exec -T web python manage.py ensure_all_regions_monitored || true
            # Pre-warm the Agrocosmos GeoJSON choropleth cache so the first
            # post-deploy user does not pay the ~20 s rebuild cost (which on
            # bursts of traffic was enough to lock all gunicorn workers).
            docker compose -f docker-compose.prod.yml exec -T web python manage.py prewarm_agro_caches || true
            docker image prune -f
            # Install/update cron jobs (idempotent: replaces marker-bounded
            # block in user crontab and scrubs legacy duplicates).
            bash /opt/edunabazar/deploy/install_cron.sh
