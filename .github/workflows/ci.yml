name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

# Concurrency is scoped PER JOB (not workflow-wide) on purpose.
# A workflow-level `cancel-in-progress: true` would also abort the `deploy`
# job when a new commit lands mid-deploy, leaving prod half-updated (git
# reset done, but migrate/collectstatic/restart not). So lint/test/docker
# stay cancellable (only the latest commit matters, saves runners), while
# `deploy` uses its own group with cancel-in-progress:false (see below).

env:
  PYTHON_VERSION: "3.13"
  DJANGO_SETTINGS_MODULE: enb_django.settings
  DJANGO_DEBUG: "1"
  DJANGO_SECRET_KEY: ci-test-secret-key-not-for-production
  DB_HOST: localhost
  DB_PORT: "5432"
  DB_NAME: test_enb
  DB_USER: postgres
  DB_PASSWORD: postgres

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    # Cancellable: a newer push supersedes lint of the older commit.
    concurrency:
      group: ci-lint-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8

      - name: Flake8 (syntax & import errors)
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Flake8 (warnings)
        run: |
          flake8 . --count --max-complexity=15 --max-line-length=120 --statistics --exit-zero

  test:
    name: Test
    runs-on: ubuntu-latest
    # Cancellable: a newer push supersedes the test run of the older commit.
    concurrency:
      group: ci-test-${{ github.ref }}
      cancel-in-progress: true
    # 30 min — accumulated migration weight (47+ migrations, several with
    # heavy PostGIS DDL) regularly puts us over the previous 20-min cap.
    # Track-down work is in docs/TODO_infra.md.
    timeout-minutes: 30

    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_enb
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      # GDAL/GEOS via cache-apt-pkgs-action. The recurring CI failure used to be
      # `apt-get` HANGING on a Debian/Ubuntu mirror, which wedged the whole job
      # up to the timeout cap. This action caches the installed .deb file trees:
      #   - cache HIT  → restores files directly (no apt, no mirror network) in
      #     a few seconds, so a flaky mirror can no longer block the job.
      #   - cache MISS → installs once, then saves the cache for later runs.
      # execute_install_scripts runs the dpkg post-install hooks (notably
      # ldconfig) so the dynamic linker resolves libgdal/libgeos by soname at
      # runtime. Bump `version` to force-invalidate the cache (e.g. GDAL ABI
      # change). Pinned to @latest per the action's docs; can be tightened to a
      # commit SHA if stricter supply-chain pinning is wanted.
      - name: Install system dependencies (GDAL/GEOS, cached)
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: gdal-bin libgdal-dev libgeos-dev
          version: gdal-1
          execute_install_scripts: true

      - name: Verify GDAL toolchain
        run: gdal-config --version

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # NOTE: no standalone `migrate` step. It used to run a FULL ~47-migration
      # replay against the service DB — redundant with the one `create_test_db`
      # already performs when building the test DB in the "Run tests" step
      # below (which fails loudly if any migration is broken). Dropping it cuts
      # the slowest part of the job roughly in half for zero loss of safety.

      # Drift gate: fail the build if a model was changed without generating its
      # migration. The repo's accumulated drift was cleaned up (agrocosmos
      # 0033/0034, my_fields 0004), so this is now green and guards against
      # re-accumulation. No DB access needed — just compares models vs files.
      - name: Check for missing migrations
        run: python manage.py makemigrations --check --dry-run

      - name: Django system check
        run: python manage.py check --deploy --fail-level WARNING 2>&1 || true

      # --parallel auto: split tests across all runner CPUs. Django clones the
      # test DB per worker via `CREATE DATABASE ... TEMPLATE` (cheap — does NOT
      # re-run migrations), so wall-clock test time drops roughly Nx. Needs
      # tblib (in requirements.txt) to ship tracebacks back from workers.
      - name: Run tests
        run: python manage.py test legacy agrocosmos --parallel auto --verbosity=2

  docker-build:
    name: Docker build check
    runs-on: ubuntu-latest
    needs: [lint, test]
    # Cancellable: only the latest commit's image matters.
    concurrency:
      group: ci-docker-${{ github.ref }}
      cancel-in-progress: true
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t enb-django:${{ github.sha }} .

  deploy:
    name: Deploy to app server
    runs-on: ubuntu-latest
    needs: [docker-build]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    # NOT cancellable. A deploy mutates the live server (git reset --hard,
    # build, migrate, collectstatic, restart). Cancelling mid-flight would
    # leave prod half-updated. cancel-in-progress:false serialises deploys:
    # a deploy from a newer push QUEUES behind the running one instead of
    # killing it.
    concurrency:
      group: deploy-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - name: Deploy via SSH to VM1 (app)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          command_timeout: 20m
          script: |
            cd /opt/edunabazar
            git fetch origin
            git reset --hard origin/main
            # Build both web and worker — they share the Dockerfile but
            # docker compose maintains them as separate image tags.
            docker compose -f docker-compose.prod.yml build web worker
            docker compose -f docker-compose.prod.yml up -d
            docker compose -f docker-compose.prod.yml exec -T web python manage.py migrate --noinput
            docker compose -f docker-compose.prod.yml exec -T web python manage.py collectstatic --noinput
            # Mark stale running PipelineRuns as failed (e.g. killed by prior worker timeout)
            docker compose -f docker-compose.prod.yml exec -T web python manage.py cleanup_stale_runs --timeout-min 10 || true
            # Make sure every Region has an active MODIS monitoring task for
            # the current year. Idempotent — only creates missing tasks and
            # reactivates paused ones; never overwrites state otherwise.
            docker compose -f docker-compose.prod.yml exec -T web python manage.py ensure_all_regions_monitored || true
            # Pre-warm the Agrocosmos GeoJSON choropleth cache so the first
            # post-deploy user does not pay the ~20 s rebuild cost (which on
            # bursts of traffic was enough to lock all gunicorn workers).
            docker compose -f docker-compose.prod.yml exec -T web python manage.py prewarm_agro_caches || true
            docker image prune -f
            # Install/update cron jobs (idempotent: replaces marker-bounded
            # block in user crontab and scrubs legacy duplicates).
            bash /opt/edunabazar/deploy/install_cron.sh
