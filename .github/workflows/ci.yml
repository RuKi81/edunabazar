name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

env:
  PYTHON_VERSION: "3.14"
  DJANGO_SETTINGS_MODULE: enb_django.settings
  DJANGO_DEBUG: "1"
  DJANGO_SECRET_KEY: ci-test-secret-key-not-for-production
  DB_HOST: localhost
  DB_PORT: "5432"
  DB_NAME: test_enb
  DB_USER: postgres
  DB_PASSWORD: postgres

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8

      - name: Flake8 (syntax & import errors)
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Flake8 (warnings)
        run: |
          flake8 . --count --max-complexity=15 --max-line-length=120 --statistics --exit-zero

  test:
    name: Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_enb
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies (GDAL/GEOS)
        run: |
          sudo apt-get update
          sudo apt-get install -y gdal-bin libgdal-dev libgeos-dev

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run migrations
        run: python manage.py migrate --noinput

      - name: Django system check
        run: python manage.py check --deploy --fail-level WARNING 2>&1 || true

      - name: Run tests
        run: python manage.py test legacy --verbosity=2

  docker-build:
    name: Docker build check
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t enb-django:${{ github.sha }} .

  deploy:
    name: Deploy to app server
    runs-on: ubuntu-latest
    needs: [docker-build]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - name: Deploy via SSH to VM1 (app)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.APP_SERVER_HOST }}
          username: ${{ secrets.APP_SERVER_USER }}
          key: ${{ secrets.APP_SERVER_SSH_KEY }}
          port: ${{ secrets.APP_SERVER_PORT || 22 }}
          script: |
            cd /opt/edunabazar
            git fetch origin
            git reset --hard origin/main
            docker compose -f deploy/app/docker-compose.yml build --no-cache web
            docker compose -f deploy/app/docker-compose.yml up -d
            docker compose -f deploy/app/docker-compose.yml exec -T web python manage.py migrate --noinput
            docker compose -f deploy/app/docker-compose.yml exec -T web python manage.py collectstatic --noinput
            docker image prune -f
