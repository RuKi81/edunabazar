name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Deploy via SSH to Proxmox → VM 100
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PVE_HOST }}
          username: root
          key: ${{ secrets.PVE_SSH_KEY }}
          command_timeout: 5m
          script: |
            # Pull latest code inside VM 100
            qm guest exec 100 --timeout 120 -- bash -c "cd /opt/edunabazar && git pull origin main"

            # Rebuild and restart containers
            qm guest exec 100 --timeout 300 -- bash -c "cd /opt/edunabazar && docker compose -f docker-compose.prod.yml up -d --build"

            # Run migrations
            qm guest exec 100 --timeout 120 -- bash -c "cd /opt/edunabazar && docker compose -f docker-compose.prod.yml exec -T web python manage.py migrate --noinput"

            # Collect static files
            qm guest exec 100 --timeout 60 -- bash -c "cd /opt/edunabazar && docker compose -f docker-compose.prod.yml exec -T web python manage.py collectstatic --noinput"
